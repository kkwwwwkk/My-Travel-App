<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>福岡慢活・日系水彩旅遊隨身 App</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Yomogi&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #e0f2fe; 
            background-image: linear-gradient(180deg, #e0f2fe 0%, #f0fdfa 100%);
            min-height: 100vh;
            margin: 0;
            padding: 0;
        }
        /* 日系水彩暈染風背景 */
        .watercolor-bg {
            position: relative;
        }
        .watercolor-bg::before {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 15% 20%, rgba(14, 165, 233, 0.15) 0%, transparent 45%),
                        radial-gradient(circle at 85% 65%, rgba(45, 212, 191, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 50% 85%, rgba(244, 63, 94, 0.06) 0%, transparent 40%);
            z-index: -1;
            pointer-events: none;
        }
        /* 行動裝置 App 容器框限 */
        .app-container {
            max-width: 480px;
            margin: 0 auto;
            background-color: #fafffa; /* 日系米白底色 */
            min-height: 100vh;
            box-shadow: 0 10px 40px rgba(14, 165, 233, 0.08);
            position: relative;
            display: flex;
            flex-direction: column;
        }
        /* 隱藏滾動條 */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        /* 漸變動畫 */
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="watercolor-bg">

    <main id="app" class="app-container">
        
        <div style="height: 250px; width: 100%; overflow: hidden; position: relative;">
            <img src="image1.png" alt="福岡旅遊橫幅" style="width: 100%; height: 100%; object-fit: cover; object-position: center; display: block;">
            <div class="absolute bottom-4 left-4 text-white drop-shadow-md" style="font-family: 'Yomogi', sans-serif;">
                <p class="text-sm opacity-90 tracking-wide">Fukuoka Trip</p>
                <h1 class="text-3xl font-bold">福岡．水色漫遊</h1>
            </div>
        </div>

        <div class="p-5 flex-1 pb-24 animate-fade-in">
            <div class="bg-white/70 backdrop-blur-sm p-4 rounded-2xl border border-sky-100 shadow-xs mb-6 text-slate-700 text-sm leading-relaxed">
                <p class="font-medium text-sky-600 mb-1">こんにちは (你好)！</p>
                歡迎來到福岡。這裡有古老的神社、美味的博多拉麵，以及舒緩的海風。讓我們一起開啟這趟充滿溫度的水彩微旅行吧。
            </div>

            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold text-slate-800"><i class="fa-solid fa-map-location-dot text-sky-500 mr-2"></i>精選福岡推薦</h2>
                <span class="text-xs text-slate-400">滑動查看更多</span>
            </div>

            <div class="flex gap-4 overflow-x-auto no-scrollbar pb-3">
                <div v-for="spot in spots" :key="spot.name" class="bg-white rounded-2xl shadow-xs border border-slate-100 p-3 min-w-[200px] max-w-[200px]">
                    <div class="w-full h-24 bg-sky-50 rounded-xl flex items-center justify-center text-sky-400 text-2xl mb-2">
                        <i :class="spot.icon"></i>
                    </div>
                    <h3 class="font-bold text-slate-800 text-sm">{{ spot.name }}</h3>
                    <p class="text-xs text-slate-500 mt-1 line-clamp-2">{{ spot.desc }}</p>
                </div>
            </div>

            <h2 class="text-lg font-bold text-slate-800 mt-6 mb-3"><i class="fa-solid fa-wand-magic-sparkles text-teal-500 mr-2"></i>隨身工具箱</h2>
            <div class="grid grid-cols-2 gap-3">
                <button @click="activeTool = 'food'" class="p-4 bg-amber-50/60 border border-amber-100 rounded-2xl text-left transition active:scale-95">
                    <i class="fa-solid fa-utensils text-amber-500 text-lg mb-2"></i>
                    <h4 class="font-bold text-slate-800 text-sm">博多美食地圖</h4>
                    <p class="text-[11px] text-slate-400 mt-0.5">拉麵、屋台總整理</p>
                </button>
                <button @click="activeTool = 'traffic'" class="p-4 bg-emerald-50/60 border border-emerald-100 rounded-2xl text-left transition active:scale-95">
                    <i class="fa-solid fa-train text-emerald-500 text-lg mb-2"></i>
                    <h4 class="font-bold text-slate-800 text-sm">交通地鐵指南</h4>
                    <p class="text-[11px] text-slate-400 mt-0.5">西鐵與地鐵一日券</p>
                </button>
            </div>
        </div>

        <nav class="absolute bottom-0 left-0 right-0 bg-white/95 border-t border-slate-100 px-6 py-2 flex justify-around items-center text-slate-400 text-xs">
            <a href="#" class="text-sky-500 flex flex-col items-center gap-1">
                <i class="fa-solid fa-compass text-lg"></i>
                <span>探索福岡</span>
            </a>
            <a href="#" class="hover:text-sky-500 flex flex-col items-center gap-1 transition">
                <i class="fa-solid fa-heart text-lg"></i>
                <span>我的收藏</span>
            </a>
            <a href="#" class="hover:text-sky-500 flex flex-col items-center gap-1 transition">
                <i class="fa-solid fa-gear text-lg"></i>
                <span>設定</span>
            </a>
        </nav>

    </main>

    <script>
        const { createApp } = Vue;

        createApp({
            data() {
                return {
                    activeTool: null,
                    // 福岡景點資料
                    spots: [
                        { name: '太宰府天滿宮', icon: 'fa-solid fa-gopuram', desc: '供奉學問之神菅原道真，必吃美味的梅枝餅。' },
                        { name: '大濠公園', icon: 'fa-solid fa-tree', desc: '市中心的廣闊水景綠地，適合午後悠閒散步。' },
                        { name: '櫛田神社', icon: 'fa-solid fa-torii-gate', desc: '博多總鎮守，每年夏季博多祇園山笠祭典的中心。' },
                        { name: '福岡塔 & 百道濱', icon: 'fa-solid fa-tower-observation', desc: '飽覽博多灣海景，唯美人工沙灘浪漫聖地。' }
                    ]
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
